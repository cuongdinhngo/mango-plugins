name: eval

# Behavioural eval — the REAL behavioural check (costs tokens, calls the model).
# Manual only; the always-on cheap guard is scripts/validate.py in validate.yml.
on:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # Same single code path as a local run: run.sh's guard accepts EITHER an
      # ANTHROPIC_API_KEY (used here, from the secret) OR an OAuth/subscription
      # login (used locally). No CI-only branch. run.sh self-scaffolds and cleans up.
      - name: Run behavioural eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash tests/eval/run.sh
